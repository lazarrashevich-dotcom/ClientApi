meta:
  environment: csharp
  toolchain:
    name: dotnet
    version: 8.0
build:
  image: mcr.microsoft.com/dotnet/sdk:8.0
  buildCommands:
    - dotnet publish -c Release -o /app
run:
  image: mcr.microsoft.com/dotnet/aspnet:8.0
  runCommands:
    - dotnet /app/ClientApi.dll
  persistenceMount: /data
  containerPort: 8080
